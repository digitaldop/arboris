{% extends "popup_base.html" %}

{% block title %}{{ popup_title }} - Arboris{% endblock %}

{% block content %}
    <div class="page-head">
        <h1 class="page-title">{{ popup_title }}</h1>
    </div>

    <div class="content-card">
        {% if ha_vincoli %}
            <div class="message message-error">{{ vincoli_message }}</div>
        {% endif %}

        <p>Confermi l'eliminazione?</p>
        <p><strong>{{ object_label }}</strong></p>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="popup" value="1">
            <input type="hidden" name="target_input_name" value="{{ target_input_name|default:'' }}">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" {% if ha_vincoli %}disabled{% endif %}>Si, elimina</button>
                <button type="button" class="btn btn-secondary" onclick="window.close()">Annulla</button>
            </div>
        </form>
    </div>
{% endblock %}
